    <!-- Theme Color for Mobile Browsers -->
    <meta name="theme-color" content="#2E7D32" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="AgroConnect" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- <link rel="apple-touch-icon" href="/apple-touch-icon.png" /> -->
    
    <!-- ========================================= -->
    <!-- Preconnect to external resources -->
    <!-- ========================================= -->
    
    <!-- OpenStreetMap -->
    <link rel="preconnect" href="https://a.tile.openstreetmap.org" />
    <link rel="preconnect" href="https://b.tile.openstreetmap.org" />
    <link rel="preconnect" href="https://c.tile.openstreetmap.org" />
    
    <!-- Esri Satellite -->
    <link rel="preconnect" href="https://server.arcgisonline.com" />
    
    <!-- OpenTopoMap -->
    <link rel="preconnect" href="https://a.tile.opentopomap.org" />
    <link rel="preconnect" href="https://b.tile.opentopomap.org" />
    <link rel="preconnect" href="https://c.tile.opentopomap.org" />
    
    <!-- CartoDB -->
    <link rel="preconnect" href="https://a.basemaps.cartocdn.com" />
    <link rel="preconnect" href="https://b.basemaps.cartocdn.com" />
    <link rel="preconnect" href="https://c.basemaps.cartocdn.com" />
    <link rel="preconnect" href="https://d.basemaps.cartocdn.com" />
    
    <!-- Cloudinary -->
    <link rel="preconnect" href="https://res.cloudinary.com" />
    <link rel="preconnect" href="https://api.cloudinary.com" />
    
    <!-- Unpkg (Leaflet CDN) -->
    <link rel="preconnect" href="https://unpkg.com" />
    
    <!-- ========================================= -->
    <!-- Leaflet CSS & JS from CDN (Enterprise GIS Pattern) -->
    <!-- ========================================= -->
    <!-- 
      CRITICAL FIX: Load Leaflet globally BEFORE the app bundle executes.
      This ensures plugins (leaflet-draw, leaflet.heat, leaflet-geosearch,
      react-leaflet-markercluster) can access the global `L` variable.
      
      Security: Using Subresource Integrity (SRI) with SHA-256 hashes
      to guarantee the CDN content hasn't been tampered with.
      
      Version pinning: @1.9.4 ensures reproducible builds.
    -->
    <link 
      rel="stylesheet" 
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <script 
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

            Esta plataforma requiere <strong>JavaScript</strong> para renderizar el mapa interactivo, la visualización geoespacial y las herramientas de dibujo de parcelas agrícolas.

          </p>
        </div>
        <footer style="margin-top: 2rem; color: #9ca3af; font-size: 0.85rem;">
          © 2026 AgroConnect - Proyecto Formativo ADSO SENA
        </footer>
      </div>
    </noscript>
  </body>
</html>
